<?xml version="1.0" encoding="UTF-8"?>
<!--
  GitHub social preview — 1280×640.
  GitHub requires PNG/JPG/GIF for the actual upload, so:
    1. Open this file in a browser  (right-click → Open with → Chrome/Edge/Firefox)
    2. Take a 1280×640 screenshot   OR convert via https://cloudconvert.com/svg-to-png
    3. Upload at  Settings → General → Social preview → Upload an image
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10121a"/>
      <stop offset="100%" stop-color="#161b26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#222840" stroke-width="1" opacity="0.4">
    <path d="M 0 213 H 1280 M 0 426 H 1280"/>
    <path d="M 320 0 V 640 M 640 0 V 640 M 960 0 V 640"/>
  </g>

  <!-- Logo: rounded square + log bars + dots -->
  <g transform="translate(160 200)">
    <rect width="240" height="240" rx="54" fill="#1a2236"/>
    <rect x="42"  y="54"  width="156" height="24" rx="6" fill="#3b82f6"/>
    <rect x="42"  y="96"  width="114" height="24" rx="6" fill="#3b82f6" opacity="0.55"/>
    <rect x="42"  y="138" width="132" height="24" rx="6" fill="#3b82f6" opacity="0.30"/>
    <circle cx="54"  cy="192" r="12" fill="#3b82f6" opacity="0.65"/>
    <circle cx="105" cy="192" r="12" fill="#3b82f6" opacity="0.65"/>
    <circle cx="156" cy="192" r="12" fill="#3b82f6" opacity="0.65"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Consolas, 'Courier New', monospace">
    <text x="470" y="290" font-size="92" font-weight="700" fill="#a8b4cc" letter-spacing="2">SW-LOG</text>
    <text x="472" y="345" font-size="28" fill="#556070">Industrial Syslog Viewer</text>

    <!-- Tagline pills -->
    <g transform="translate(470 400)" font-size="20" fill="#a8b4cc">
      <g>
        <rect width="178" height="42" rx="6" fill="#161b26" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="89" y="28" text-anchor="middle">RFC 5424 / 3164</text>
      </g>
      <g transform="translate(192 0)">
        <rect width="160" height="42" rx="6" fill="#161b26" stroke="#2dd4bf" stroke-width="1.5"/>
        <text x="80" y="28" text-anchor="middle">Live + History</text>
      </g>
      <g transform="translate(366 0)">
        <rect width="190" height="42" rx="6" fill="#161b26" stroke="#7c6df8" stroke-width="1.5"/>
        <text x="95" y="28" text-anchor="middle">.NET 6 &#8226; .NET 9</text>
      </g>
    </g>
  </g>

  <!-- Bottom accent stripe -->
  <rect x="0" y="630" width="1280" height="10" fill="url(#accent)"/>
</svg>

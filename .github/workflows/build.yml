name: Build

on:
  push:
    branches: [ master ]
    tags:     [ '*' ]       # any tag → publish a release (v1.2.3, Release_V0.01, etc.)
  pull_request:
    branches: [ master ]
  workflow_dispatch:        # lets you trigger the workflow manually from the Actions tab

permissions:
  contents: write           # required so the release step can create a GitHub Release

# Silences the deprecation warning until actions/checkout & actions/setup-dotnet
# bump to Node 24 by default. Safe to remove once they do.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6 + 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            9.0.x

      - name: Restore
        run: dotnet restore csharp/ScalanceLogs.csproj

      - name: Build (Release, both target frameworks)
        run: dotnet build csharp/ScalanceLogs.csproj -c Release --no-restore

      # ── Tag-only steps below: publish self-contained binaries and cut a Release ──

      - name: Publish self-contained — net6
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish csharp/ScalanceLogs.csproj -c Release
          -f net6.0-windows -r win-x64 --self-contained true
          -p:PublishReadyToRun=true
          -o publish/net6

      - name: Publish self-contained — net9
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish csharp/ScalanceLogs.csproj -c Release
          -f net9.0-windows -r win-x64 --self-contained true
          -p:PublishReadyToRun=true
          -o publish/net9

      - name: Package zips
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish/net6/* -DestinationPath "SW-LOG-$tag-net6-win-x64.zip"
          Compress-Archive -Path publish/net9/* -DestinationPath "SW-LOG-$tag-net9-win-x64.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SW-LOG-*.zip
          generate_release_notes: true   # GitHub auto-generates the change list from PRs/commits
          draft: false
          prerelease: false

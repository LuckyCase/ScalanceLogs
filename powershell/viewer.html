<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW-Log Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Barlow:wght@400;600;700&display=swap');

  :root {
    --bg:       #10121a;
    --surface:  #161b26;
    --border:   #222840;
    --accent:   #4fa8c5;
    --accent2:  #2d6a82;
    --green:    #4a9e72;
    --red:      #b85555;
    --yellow:   #b8913a;
    --muted:    #3d4a60;
    --text:     #a8b4cc;
    --text-dim: #556070;
    --mono:     'Roboto Mono', monospace;
    --sans:     'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    border: 2px solid var(--accent);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    padding: 4px;
  }
  .logo-icon span { background: var(--accent); display: block; }
  .logo-icon span:nth-child(3) { background: var(--accent2); }

  .header-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
  .header-sub   { font-size: 13px; color: var(--text-dim); font-family: var(--mono); }

  .spacer { flex: 1; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .status-dot.ok   { background: var(--green); }
  .status-dot.warn { background: var(--yellow); }
  .status-label    { font-family: var(--mono); font-size: 12px; color: var(--text-dim); transition: color 0.4s; }
  .status-label.warn { color: var(--yellow); }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
    transition: width 0.2s ease;
    overflow: hidden;
  }

  aside.collapsed { width: 32px; }

  /* Collapsed strip */
  .sidebar-strip {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    width: 32px;
    flex-shrink: 0;
  }
  aside.collapsed .sidebar-strip { display: flex; }

  /* Main content (hidden when collapsed) */
  .sidebar-main {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
    min-width: 220px;
  }
  aside.collapsed .sidebar-main { display: none; }

  /* Section label row */
  .sidebar-label {
    padding: 10px 12px 8px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  /* ── Panel toggle buttons ── */
  .panel-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 5px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .panel-btn:hover { border-color: var(--accent); color: var(--accent); }

  .strip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: var(--mono);
  }
  .strip-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Files section ── */
  .sidebar-files-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 80px;
  }

  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  /* File groups */
  .file-group-header {
    padding: 7px 12px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .file-group-header:hover { color: var(--text); background: rgba(0,200,255,0.04); }
  .file-group-header.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(0,200,255,0.07);
  }

  .fg-icon {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .file-group-header.active .fg-icon { background: var(--accent); }

  .fg-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .fg-arrow {
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: transform 0.15s;
    margin-left: 2px;
  }
  .file-group-header.expanded .fg-arrow { transform: rotate(90deg); }

  .file-group-children { display: none; }
  .file-group-children.visible { display: block; }

  .file-child {
    padding: 5px 12px 5px 26px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .file-child:hover { color: var(--text); background: rgba(0,200,255,0.04); }
  .file-child.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(0,200,255,0.07);
  }
  .fc-icon { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .file-child.active .fc-icon { background: var(--accent); }

  /* ── Sidebar resizer ── */
  .sidebar-resizer {
    height: 5px;
    background: var(--border);
    cursor: ns-resize;
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }
  .sidebar-resizer::after {
    content: '';
    position: absolute;
    inset: -3px 0;
  }
  .sidebar-resizer:hover,
  .sidebar-resizer.dragging { background: var(--accent2); }

  /* ── Switches section ── */
  .sidebar-switches-section {
    flex: 0 0 160px;
    display: flex;
    flex-direction: column;
    min-height: 60px;
    overflow: hidden;
  }

  .switch-feed {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .switch-item {
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 2px solid var(--accent);
    overflow: hidden;
  }

  .sw-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .sw-empty {
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ── Main ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Toolbar ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 320px;
    min-width: 120px;
  }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 13px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 12px 7px 32px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-auto { border-color: var(--accent2); color: var(--accent); }
  .btn-auto.active { background: rgba(0,200,255,0.1); border-color: var(--accent); }

  .quick-filters { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .btn-qf {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-qf:hover { border-color: var(--accent); color: var(--accent); }
  .btn-qf.active { background: rgba(0,200,255,0.1); border-color: var(--accent); color: var(--accent); }

  /* ── Stats bar ── */
  .stats {
    padding: 6px 20px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    align-items: center;
    flex-shrink: 0;
  }
  .stat { font-family: var(--mono); font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .stat-val  { color: var(--accent); font-weight: 600; }
  .stat-err  { color: var(--red); }
  .stat-warn { color: var(--yellow); }
  .stat-ok   { color: var(--green); }

  /* ── Log area ── */
  .log-wrap { flex: 1; overflow-y: auto; padding: 8px 0; scroll-behavior: smooth; }

  .log-empty {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text-dim);
    font-family: var(--mono); font-size: 14px; letter-spacing: 0.5px;
  }

  .log-entry { }

  .log-line {
    display: flex;
    align-items: baseline;
    padding: 3px 20px 3px 8px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .log-line:hover { background: rgba(255,255,255,0.03); }

  .log-line.sev-error, .log-line.sev-crit,
  .log-line.sev-emerg, .log-line.sev-alert {
    border-left-color: var(--red);
    background: rgba(255,61,61,0.05);
  }
  .log-line.sev-warn { border-left-color: var(--yellow); background: rgba(255,215,64,0.04); }
  .log-line.ev-down  { border-left-color: var(--red)   !important; }
  .log-line.ev-up    { border-left-color: var(--green) !important; }

  .col-expand {
    color: var(--text-dim);
    cursor: pointer;
    font-size: 10px;
    padding-right: 4px;
    flex-shrink: 0;
    width: 16px;
    user-select: none;
    transition: color 0.15s;
    align-self: center;
  }
  .col-expand:hover { color: var(--accent); }

  .col-ts   { color: var(--text-dim); min-width: 168px; flex-shrink: 0; }
  .col-sev  { min-width: 84px; flex-shrink: 0; font-size: 12px; }
  .col-host { min-width: 200px; flex-shrink: 0; color: var(--accent); }
  .col-msg  { color: var(--text); flex: 1; }

  .sev-chip {
    display: inline-block;
    padding: 2px 6px;
    font-size: 11px;
    letter-spacing: 0.3px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .chip-error, .chip-crit, .chip-emerg, .chip-alert { background: rgba(255,61,61,0.2);  color: var(--red); }
  .chip-warn                                         { background: rgba(255,215,64,0.15); color: var(--yellow); }
  .chip-info, .chip-notice                           { background: rgba(0,200,255,0.1);   color: var(--accent); }
  .chip-debug                                        { background: rgba(100,100,100,0.15);color: var(--muted); }

  .kw-down                   { color: var(--red);    font-weight: 600; }
  .kw-up                     { color: var(--green);  font-weight: 600; }
  .kw-fault, .kw-error, .kw-fail { color: var(--yellow); }

  /* Raw expand row */
  .raw-expand {
    padding: 5px 20px 7px 44px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.2);
    border-left: 2px solid var(--muted);
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  /* ── Live panel ── */
  .live-panel {
    width: 290px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
    transition: width 0.2s ease;
    overflow: hidden;
  }
  .live-panel.collapsed { width: 32px; }

  .live-strip {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    width: 32px;
    flex-shrink: 0;
  }
  .live-panel.collapsed .live-strip { display: flex; }

  .live-content {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 290px;
  }
  .live-panel.collapsed .live-content { display: none; }

  .live-header {
    padding: 10px 14px 9px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .live-header .lh-title { flex: 1; }

  .live-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(79,168,197,0.12);
    padding: 1px 8px;
    border-radius: 10px;
    min-width: 24px;
    text-align: center;
  }

  .live-feed { flex: 1; overflow-y: auto; padding: 4px 0; }

  .live-line {
    padding: 5px 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.4;
    border-left: 2px solid transparent;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .live-line.sev-error, .live-line.sev-crit,
  .live-line.sev-emerg, .live-line.sev-alert { border-left-color: var(--red); }
  .live-line.sev-warn { border-left-color: var(--yellow); }
  .live-line.ev-down  { border-left-color: var(--red)   !important; }
  .live-line.ev-up    { border-left-color: var(--green) !important; }

  .live-time { font-size: 11px; color: var(--text-dim); }
  .live-body { display: flex; align-items: baseline; gap: 6px; overflow: hidden; }
  .live-msg  { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .live-empty { padding: 20px 14px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: center; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Footer ── */
  footer {
    height: 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 16px; flex-shrink: 0;
  }
  .footer-text { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; }

  /* ── Sidebar overlay (mobile) ── */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 199;
    background: rgba(0,0,0,0.45);
  }
  .sidebar-overlay.visible { display: block; }

  /* ── 860px: sidebar drawer ── */
  @media (max-width: 860px) {
    aside:not(.collapsed) {
      position: fixed;
      top: 56px; left: 0; bottom: 28px;
      z-index: 200;
      width: 220px !important;
      transform: translateX(-100%);
      transition: transform 0.22s ease;
    }
    aside.open:not(.collapsed) {
      transform: translateX(0);
      box-shadow: 6px 0 28px rgba(0,0,0,0.55);
    }
    aside.collapsed { position: static; }
    .col-host { display: none; }
    .live-panel { display: none; }
    #mobileMenuBtn { display: flex !important; }
  }

  @media (max-height: 600px) {
    header { height: 44px; }
    .header-sub { display: none; }
    footer { height: 22px; }
    .log-line { padding: 1px 20px 1px 8px; line-height: 1.55; }
    .live-line { padding: 3px 14px; }
  }

  @media (max-height: 460px) {
    .stats { display: none; }
  }

  @media (max-width: 580px) {
    .toolbar { flex-wrap: wrap; gap: 8px; }
    .search-wrap { max-width: none; width: 100%; order: -1; }
    .stats { flex-wrap: wrap; gap: 8px 16px; height: auto; padding: 8px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
    SW-LOG
  </div>
  <div>
    <div class="header-title">Syslog Viewer</div>
    <div class="header-sub">Industrial Switch Monitor</div>
  </div>
  <div class="spacer"></div>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-label" id="statusLabel">connecting...</div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<div class="layout">

  <!-- ── Left Sidebar ── -->
  <aside id="sidebar">

    <!-- Collapsed strip -->
    <div class="sidebar-strip">
      <button class="strip-btn" onclick="toggleSidebarCollapse()" title="Expand panel">▶</button>
    </div>

    <!-- Main content -->
    <div class="sidebar-main">

      <!-- Log files section -->
      <div class="sidebar-files-section" id="sidebarFilesSection">
        <div class="sidebar-label">
          <span>Log Files</span>
          <button class="panel-btn" onclick="toggleSidebarCollapse()" title="Collapse panel">◀</button>
        </div>
        <div class="file-list" id="fileList">
          <div class="log-empty" style="height:60px;font-size:12px;">loading...</div>
        </div>
      </div>

      <!-- Draggable resizer -->
      <div class="sidebar-resizer" id="sidebarResizer"></div>

      <!-- Switches section -->
      <div class="sidebar-switches-section" id="sidebarSwitchesSection">
        <div class="sidebar-label"><span>Switches</span></div>
        <div class="switch-feed" id="switchFeed">
          <div class="sw-empty">No active switches</div>
        </div>
      </div>

    </div>
  </aside>

  <!-- ── Main ── -->
  <main>
    <div class="toolbar">
      <button class="btn" id="mobileMenuBtn" style="display:none;padding:7px 10px;font-size:15px" onclick="toggleMobileSidebar()">☰</button>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search...">
      </div>
      <div class="quick-filters" id="quickFilters"></div>
      <select id="lineCount">
        <option value="50">50 lines</option>
        <option value="100">100 lines</option>
        <option value="200" selected>200 lines</option>
        <option value="500">500 lines</option>
        <option value="1000">1000 lines</option>
      </select>
      <button class="btn" onclick="loadLog()">↻ Refresh</button>
      <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">⏱ Auto</button>
    </div>

    <div class="stats">
      <span class="stat">Lines: <span class="stat-val" id="statTotal">—</span></span>
      <span class="stat">Errors: <span class="stat-val stat-err" id="statErr">—</span></span>
      <span class="stat">Warnings: <span class="stat-val stat-warn" id="statWarn">—</span></span>
      <span class="stat">Link Down: <span class="stat-val stat-err" id="statDown">—</span></span>
      <span class="stat">Link Up: <span class="stat-val stat-ok" id="statUp">—</span></span>
    </div>

    <div class="log-wrap" id="logWrap">
      <div class="log-empty">Select a log file</div>
    </div>
  </main>

  <!-- ── Live Panel ── -->
  <div class="live-panel" id="livePanel">

    <!-- Collapsed strip -->
    <div class="live-strip">
      <button class="strip-btn" onclick="toggleLiveCollapse()" title="Expand panel">◀</button>
    </div>

    <!-- Live content -->
    <div class="live-content">
      <div class="live-header">
        <button class="panel-btn" onclick="toggleLiveCollapse()" title="Collapse panel">▶</button>
        <span class="lh-title">Live Events</span>
        <span class="live-badge" id="liveBadge">0</span>
      </div>
      <div class="live-feed" id="liveFeed">
        <div class="live-empty">Waiting for events...</div>
      </div>
    </div>

  </div>

</div>

<footer>
  <span class="footer-text">Industrial Syslog Collector</span>
  <span class="footer-text" id="footerFile">—</span>
  <div class="spacer"></div>
  <span class="footer-text">IVTI</span>
</footer>

<script>
const API = '';

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Config ─────────────────────────────────────────────────────
let msgTypes     = [];
let quickFilters = [];

async function loadConfig() {
  try {
    const r    = await fetch(`${API}/api/config`);
    const data = await r.json();
    msgTypes = (data.message_types || []).map(mt => ({
      re:    new RegExp(mt.pattern, 'i'),
      label: mt.label,
      color: mt.color || '',
      bg:    mt.bg    || '',
    }));
    quickFilters = data.quick_filters || [];
    renderQuickFilters();
  } catch(e) {
    console.warn('Config load failed, using defaults');
  }
}

function applyMsgType(msg) {
  for (const mt of msgTypes) {
    if (mt.re.test(msg)) return mt;
  }
  return null;
}

// ── Quick filters ───────────────────────────────────────────────
let activeFilterQuery = '';

function renderQuickFilters() {
  const c = document.getElementById('quickFilters');
  if (!quickFilters.length) { c.innerHTML = ''; return; }
  c.innerHTML = quickFilters.map(f =>
    `<button class="btn-qf" data-query="${escapeHtml(f.query)}"
       onclick="applyQuickFilter(this,'${escapeHtml(f.query)}')">${escapeHtml(f.label)}</button>`
  ).join('');
}

function applyQuickFilter(btn, query) {
  const input = document.getElementById('searchInput');
  if (activeFilterQuery === query) {
    activeFilterQuery = '';
    input.value = '';
    document.querySelectorAll('.btn-qf').forEach(b => b.classList.remove('active'));
  } else {
    activeFilterQuery = query;
    input.value = query;
    document.querySelectorAll('.btn-qf').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  loadLog();
}

// ── Status ──────────────────────────────────────────────────────
let currentFile  = '';
let autoRefresh  = false;
let autoTimer    = null;
const INTERVAL   = 5000;
let lastOkTime   = null;
let statusTicker = null;

function updateStatus() {
  lastOkTime = Date.now();
  tickStatus();
  if (!statusTicker) statusTicker = setInterval(tickStatus, 1000);
}

function tickStatus() {
  if (!lastOkTime) return;
  const dot   = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  const sec   = Math.floor((Date.now() - lastOkTime) / 1000);
  const text  = sec < 60 ? `Updated ${sec}s ago` : `Updated ${Math.floor(sec/60)}m ago`;
  const stale = sec >= 15;
  dot.className   = `status-dot ${stale ? 'warn' : 'ok'}`;
  label.className = `status-label${stale ? ' warn' : ''}`;
  label.textContent = text;
}

// ── File list ───────────────────────────────────────────────────
const expandedDates = new Set();
let filesInitDone   = false;

function groupFiles(files) {
  const groups = new Map(); // date → { eventsFile, switches: [{name, file}] }
  for (const f of files) {
    const evM = f.match(/^events_(\d{4}-\d{2}-\d{2})\.log$/);
    if (evM) {
      const d = evM[1];
      if (!groups.has(d)) groups.set(d, { eventsFile: null, switches: [] });
      groups.get(d).eventsFile = f;
      continue;
    }
    // e.g. 192_168_179_11_PN-SW01_2026-04-18.log
    const swM = f.match(/^((?:\d+_){3}\d+)_(.+)_(\d{4}-\d{2}-\d{2})\.log$/);
    if (swM) {
      const [, , name, date] = swM;
      if (!groups.has(date)) groups.set(date, { eventsFile: null, switches: [] });
      groups.get(date).switches.push({ name, file: f });
    }
  }
  return new Map([...groups.entries()].sort((a, b) => b[0].localeCompare(a[0])));
}

async function loadFiles() {
  try {
    const r     = await fetch(`${API}/api/files`);
    const files = await r.json();
    const el    = document.getElementById('fileList');

    if (!files.length) {
      el.innerHTML = '<div class="log-empty" style="height:60px;font-size:12px;">no files</div>';
      return;
    }

    const groups = groupFiles(files);
    const today  = new Date().toISOString().slice(0, 10);

    if (!filesInitDone) filesInitDone = true;

    // Auto-select latest events file on first load
    if (!currentFile) {
      const latestGroup = [...groups.values()][0];
      if (latestGroup) {
        currentFile = latestGroup.eventsFile || latestGroup.switches[0]?.file || '';
        if (currentFile) {
          document.getElementById('footerFile').textContent = currentFile;
          loadLog();
        }
      }
    }

    el.innerHTML = [...groups.entries()].map(([date, g]) => {
      const isExpanded  = expandedDates.has(date);
      const headerFile  = g.eventsFile || '';
      const isActive    = currentFile === headerFile;
      const hasSwitches = g.switches.length > 0;
      const headerName  = g.eventsFile ? `events_${date}.log` : date;

      const childrenHtml = g.switches.map(sw => `
        <div class="file-child ${currentFile === sw.file ? 'active' : ''}"
             onclick="selectFile('${escapeHtml(sw.file)}')">
          <span class="fc-icon"></span>${escapeHtml(sw.name)}
        </div>`).join('');

      return `<div class="file-group" data-date="${date}">
        <div class="file-group-header ${isActive ? 'active' : ''} ${isExpanded ? 'expanded' : ''}"
             onclick="onGroupClick(event,'${date}','${escapeHtml(headerFile)}')">
          <span class="fg-icon"></span>
          <span class="fg-name">${escapeHtml(headerName)}</span>
          ${hasSwitches ? '<span class="fg-arrow">▶</span>' : ''}
        </div>
        ${hasSwitches
          ? `<div class="file-group-children ${isExpanded ? 'visible' : ''}">${childrenHtml}</div>`
          : ''}
      </div>`;
    }).join('');

  } catch(e) { console.error(e); }
}

function onGroupClick(event, date, headerFile) {
  if (event.target.classList.contains('fg-arrow')) {
    // Arrow click → toggle expand only, do NOT select file
    const hdr      = event.currentTarget;
    const group    = hdr.closest('.file-group');
    const children = group.querySelector('.file-group-children');
    if (children) {
      const isExpanded = expandedDates.has(date);
      if (isExpanded) expandedDates.delete(date);
      else            expandedDates.add(date);
      hdr.classList.toggle('expanded', !isExpanded);
      children.classList.toggle('visible', !isExpanded);
    }
  } else if (headerFile) {
    // Everything else → select file only, do NOT toggle expand
    selectFile(headerFile);
  }
}

function selectFile(f) {
  currentFile = f;
  document.getElementById('footerFile').textContent = f;
  closeMobileSidebar();
  loadFiles();
  loadLog();
}

// ── Load log ────────────────────────────────────────────────────
async function loadLog() {
  if (!currentFile) return;
  const search = document.getElementById('searchInput').value.trim();
  const lines  = document.getElementById('lineCount').value;
  const url    = `${API}/api/log?file=${encodeURIComponent(currentFile)}&lines=${lines}&search=${encodeURIComponent(search)}`;
  try {
    const r    = await fetch(url);
    const data = await r.json();
    renderLog(data);
  } catch(e) {
    document.getElementById('logWrap').innerHTML =
      '<div class="log-empty">Load error. Is viewer_server.py running?</div>';
  }
}

// ── Extract useful message from raw syslog ──────────────────────
// Input: "<134>1 2000-01-08T... HOSTNAME APP PROCID MSGID [meta sysUpTime="..."] Useful text."
// Output: "Useful text."
function extractMsg(raw) {
  const m = raw.match(/\[[^\]]*\]\s*(.+)$/);
  return m ? m[1].trim() : raw.trim();
}

// ── Render log ──────────────────────────────────────────────────
function renderLog(data) {
  const wrap  = document.getElementById('logWrap');
  const lines = data.lines || [];

  if (data.error) { wrap.innerHTML = `<div class="log-empty">${escapeHtml(data.error)}</div>`; resetStats(); return; }
  if (!lines.length) { wrap.innerHTML = '<div class="log-empty">No events</div>'; resetStats(); return; }

  // Save which raw-expand blocks are open so auto-refresh doesn't collapse them
  const expandedRaws = new Set();
  wrap.querySelectorAll('.raw-expand:not([hidden])').forEach(el => expandedRaws.add(el.textContent.trim()));

  let errCount=0, warnCount=0, downCount=0, upCount=0;

  wrap.innerHTML = [...lines].reverse().map(line => {
    const sevMatch = line.match(/\[(EMERG|ALERT|CRIT|ERROR|WARN|NOTICE|INFO|DEBUG)\s*\]/i);
    const sev      = sevMatch ? sevMatch[1].toLowerCase() : 'info';
    const isDown   = /link\s+down|port.*down/i.test(line);
    const isUp     = /link\s+up|port.*up/i.test(line);

    if (['error','crit','emerg','alert'].includes(sev)) errCount++;
    if (sev === 'warn') warnCount++;
    if (isDown) downCount++;
    if (isUp)   upCount++;

    const colMatch = line.match(/^(\d{4}-\d{2}-\d{2}\s[\d:]+)\s+\[([^\]]+)\]\s+([^|]+)\|\s*(.*)$/);
    let ts='', sevStr=sev.toUpperCase(), host='', rawPart=line;
    if (colMatch) {
      [, ts, sevStr, host, rawPart] = colMatch;
      host = host.trim();
    }

    const usefulMsg = extractMsg(rawPart);
    const mt        = applyMsgType(usefulMsg);
    const sevKey    = sevStr.trim().toLowerCase();

    const chipHtml = mt
      ? `<span class="sev-chip" style="background:${escapeHtml(mt.bg)};color:${escapeHtml(mt.color)}">${escapeHtml(mt.label)}</span>`
      : `<span class="sev-chip chip-${sevKey}">${escapeHtml(sevStr.trim())}</span>`;

    const rowStyle  = mt ? ` style="background:${mt.bg};border-left-color:${mt.color}"` : '';
    const lineClass = [
      mt ? '' : `sev-${sevKey}`,
      isDown ? 'ev-down' : '',
      isUp   ? 'ev-up'   : '',
    ].filter(Boolean).join(' ');

    const msgHtml = escapeHtml(usefulMsg)
      .replace(/\b(down)\b/gi,           '<span class="kw-down">$1</span>')
      .replace(/\b(up)\b/gi,             '<span class="kw-up">$1</span>')
      .replace(/\b(fault|error|fail)\b/gi,'<span class="kw-fault">$1</span>');

    return `<div class="log-entry">
      <div class="log-line ${lineClass}"${rowStyle}>
        <span class="col-expand" onclick="toggleExpand(this)" title="Show raw syslog">▸</span>
        <span class="col-ts">${escapeHtml(ts)}</span>
        <span class="col-sev">${chipHtml}</span>
        <span class="col-host">${escapeHtml(host)}</span>
        <span class="col-msg">${msgHtml}</span>
      </div>
      <div class="raw-expand" hidden>${escapeHtml(rawPart)}</div>
    </div>`;
  }).join('');

  document.getElementById('statTotal').textContent = data.total;
  document.getElementById('statErr').textContent   = errCount;
  document.getElementById('statWarn').textContent  = warnCount;
  document.getElementById('statDown').textContent  = downCount;
  document.getElementById('statUp').textContent    = upCount;

  // Restore previously expanded raw blocks
  if (expandedRaws.size) {
    wrap.querySelectorAll('.raw-expand').forEach(el => {
      if (expandedRaws.has(el.textContent.trim())) {
        el.hidden = false;
        const btn = el.previousElementSibling.querySelector('.col-expand');
        if (btn) btn.textContent = '▾';
      }
    });
  }
}

function toggleExpand(btn) {
  const raw  = btn.closest('.log-entry').querySelector('.raw-expand');
  raw.hidden = !raw.hidden;
  btn.textContent = raw.hidden ? '▸' : '▾';
}

function resetStats() {
  ['statTotal','statErr','statWarn','statDown','statUp']
    .forEach(id => document.getElementById(id).textContent = '0');
}

// ── Auto-refresh ────────────────────────────────────────────────
function toggleAuto() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('autoBtn');
  btn.classList.toggle('active', autoRefresh);
  if (autoRefresh) { autoTimer = setInterval(loadLog, INTERVAL); }
  else             { clearInterval(autoTimer); }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadLog();
});

// ── Panel collapse ──────────────────────────────────────────────
function toggleSidebarCollapse() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleLiveCollapse() {
  document.getElementById('livePanel').classList.toggle('collapsed');
}

// ── Mobile sidebar ──────────────────────────────────────────────
function toggleMobileSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('visible');
}
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// ── Sidebar resizer (drag to split files/switches) ──────────────
(function() {
  const resizer  = document.getElementById('sidebarResizer');
  const switchSec = document.getElementById('sidebarSwitchesSection');
  const sidebar   = document.getElementById('sidebar');
  let dragging = false, startY = 0, startH = 0;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startY   = e.clientY;
    startH   = switchSec.offsetHeight;
    resizer.classList.add('dragging');
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const sideH = sidebar.offsetHeight;
    const delta = startY - e.clientY; // drag up = switches taller
    const newH  = Math.max(60, Math.min(sideH - 100, startH + delta));
    switchSec.style.flex = `0 0 ${newH}px`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.userSelect = '';
  });
})();

// ── Switches panel ──────────────────────────────────────────────
const SWITCH_FADE_SEC = 30;
const SWITCH_ALPHA    = 0.25;
let switchItems     = new Map(); // name → { el, t }
let switchAnimating = false;
let switchLastTs    = null;

function animateSwitches(ts) {
  const delta = switchLastTs ? (ts - switchLastTs) / 1000 : 0;
  switchLastTs = ts;
  let active = false;

  for (const [name, item] of switchItems) {
    item.t += delta / SWITCH_FADE_SEC;
    if (item.t >= 1) {
      item.el.remove();
      switchItems.delete(name);
    } else {
      item.el.style.opacity         = (1 - item.t).toFixed(4);
      item.el.style.backgroundColor = `rgba(79,168,197,${((1-item.t)*SWITCH_ALPHA).toFixed(4)})`;
      active = true;
    }
  }

  if (active) { requestAnimationFrame(animateSwitches); }
  else        { switchAnimating = false; switchLastTs = null; }
}

function activateSwitch(name) {
  if (!name) return;
  const feed = document.getElementById('switchFeed');

  // Remove placeholder
  const ph = feed.querySelector('.sw-empty');
  if (ph) ph.remove();

  if (switchItems.has(name)) {
    const item = switchItems.get(name);
    item.t = 0;
    item.el.style.opacity         = '1';
    item.el.style.backgroundColor = `rgba(79,168,197,${SWITCH_ALPHA})`;
    feed.prepend(item.el);
  } else {
    const el = document.createElement('div');
    el.className = 'switch-item';
    el.style.backgroundColor = `rgba(79,168,197,${SWITCH_ALPHA})`;
    el.innerHTML = `<span class="sw-dot"></span>${escapeHtml(name)}`;
    feed.prepend(el);
    switchItems.set(name, { el, t: 0 });
  }

  if (!switchAnimating) {
    switchAnimating = true;
    switchLastTs    = null;
    requestAnimationFrame(animateSwitches);
  }
}

function extractSwitchName(line) {
  const m = line.match(/\(([^)]+)\)/);
  return m ? m[1] : null;
}

// ── Live panel ──────────────────────────────────────────────────
const LIVE_MAX         = 100;
const LIVE_FADE_SEC    = 30;
const LIVE_ALPHA       = 0.18;
const LIVE_EXPIRE_MS   = 60 * 60 * 1000;
const LIVE_EXPIRE_FADE = 10;

let liveHighlights = [];
let liveExpiries   = [];
let liveAnimating  = false;
let liveLastTs     = null;
let livePrevSet    = new Set();
let liveInitDone   = false;

function animateLive(ts) {
  const delta = liveLastTs ? (ts - liveLastTs) / 1000 : 0;
  liveLastTs = ts;

  for (let i = liveHighlights.length - 1; i >= 0; i--) {
    const h = liveHighlights[i];
    h.t += delta / h.dur;
    if (h.t >= 1) {
      h.el.style.removeProperty('background-color');
      liveHighlights.splice(i, 1);
    } else {
      h.el.style.backgroundColor = `rgba(79,168,197,${((1-h.t)*LIVE_ALPHA).toFixed(4)})`;
    }
  }
  document.getElementById('liveBadge').textContent = liveHighlights.length;

  for (let i = liveExpiries.length - 1; i >= 0; i--) {
    const e = liveExpiries[i];
    e.t += delta / LIVE_EXPIRE_FADE;
    if (e.t >= 1) {
      e.el.remove();
      liveExpiries.splice(i, 1);
    } else {
      e.el.style.opacity   = (1 - e.t).toFixed(4);
      e.el.style.maxHeight = ((1-e.t)*48).toFixed(1) + 'px';
    }
  }

  if (liveHighlights.length || liveExpiries.length) { requestAnimationFrame(animateLive); }
  else { liveAnimating = false; liveLastTs = null; }
}

function ensureLiveAnimating() {
  if (!liveAnimating) { liveAnimating = true; liveLastTs = null; requestAnimationFrame(animateLive); }
}

function startHighlights(els) {
  if (liveHighlights.length) {
    const f = els.length >= 4 ? 1.35 : els.length >= 2 ? 1.2 : 1.1;
    liveHighlights.forEach(h => { h.dur = Math.max(h.dur / f, 0.3); });
  }
  els.forEach(el => {
    el.style.backgroundColor = `rgba(79,168,197,${LIVE_ALPHA})`;
    liveHighlights.push({ el, t: 0, dur: LIVE_FADE_SEC });
  });
  ensureLiveAnimating();
}

function checkLiveExpiry() {
  const now  = Date.now();
  const feed = document.getElementById('liveFeed');
  let started = false;
  [...feed.children].forEach(el => {
    if (liveExpiries.some(e => e.el === el)) return;
    const addedAt = parseInt(el.dataset.addedAt || '0');
    if (addedAt && (now - addedAt) >= LIVE_EXPIRE_MS) {
      el.style.overflow  = 'hidden';
      el.style.maxHeight = el.offsetHeight + 'px';
      liveExpiries.push({ el, t: 0 });
      started = true;
    }
  });
  if (started) ensureLiveAnimating();
}

function buildLiveLine(line, useLogTimestamp = false) {
  const sevMatch = line.match(/\[(EMERG|ALERT|CRIT|ERROR|WARN|NOTICE|INFO|DEBUG)\s*\]/i);
  const sev      = sevMatch ? sevMatch[1].toLowerCase() : 'info';
  const isDown   = /link\s+down|port.*down/i.test(line);
  const isUp     = /link\s+up|port.*up/i.test(line);

  const col = line.match(/^(\d{4}-\d{2}-\d{2}\s([\d:]+))\s+\[([^\]]+)\]\s+([\d.]+(?:\s+\([^)]+\))?)[^|]*\|\s*(.*)$/);
  let time='', sevStr=sev.toUpperCase(), hostFull='', rawPart=line;
  if (col) { time = col[2]; sevStr = col[3].trim(); hostFull = col[4]; rawPart = col[5]; }

  const usefulMsg = extractMsg(rawPart);
  const mt = applyMsgType(usefulMsg);

  const chipHtml = mt
    ? `<span class="sev-chip" style="background:${escapeHtml(mt.bg)};color:${escapeHtml(mt.color)}">${escapeHtml(mt.label)}</span>`
    : `<span class="sev-chip chip-${sev}">${escapeHtml(sevStr)}</span>`;

  const swName = (hostFull.match(/\(([^)]+)\)/) || [])[1] || hostFull.trim();

  const msgHtml = escapeHtml(usefulMsg)
    .replace(/\b(down)\b/gi,            '<span class="kw-down">$1</span>')
    .replace(/\b(up)\b/gi,              '<span class="kw-up">$1</span>')
    .replace(/\b(fault|error|fail)\b/gi, '<span class="kw-fault">$1</span>');

  const cls = ['live-line', `sev-${sev}`, isDown?'ev-down':'', isUp?'ev-up':''].filter(Boolean).join(' ');
  const el  = document.createElement('div');
  el.className = cls;
  const dtM = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
  if (useLogTimestamp) {
    const dtM = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
    el.dataset.addedAt = dtM ? new Date(dtM[1]).getTime() : Date.now();
  } else {
    el.dataset.addedAt = Date.now();
  }
  el.innerHTML = `<span class="live-time">${escapeHtml(time)}&nbsp;&nbsp;<span style="color:var(--accent)">${escapeHtml(swName)}</span></span>
    <div class="live-body">${chipHtml}<span class="live-msg">${msgHtml}</span></div>`;
  return el;
}

async function pollLive() {
  try {
    const rf    = await fetch('/api/files');
    const files = await rf.json();
    const evFile = [...files].filter(f => f.startsWith('events_')).sort().at(-1);
    if (!evFile) return;

    const rl   = await fetch(`/api/log?file=${encodeURIComponent(evFile)}&lines=${LIVE_MAX}`);
    const data = await rl.json();
    const lines = (data.lines || []).filter(l => l.trim());

    if (!liveInitDone) {
      lines.forEach(l => livePrevSet.add(l));
      liveInitDone = true;
      // Feed starts empty — only new messages will appear
      return;
    }

    const newLines = lines.filter(l => !livePrevSet.has(l));
    if (!newLines.length) return;
    newLines.forEach(l => livePrevSet.add(l));

    const feed   = document.getElementById('liveFeed');
    const newEls = newLines.map(buildLiveLine);
    newEls.forEach(el => feed.prepend(el));
    while (feed.children.length > LIVE_MAX) feed.removeChild(feed.lastChild);

    startHighlights(newEls);
    updateStatus();

    // Activate switch indicators for new messages
    newLines.forEach(l => activateSwitch(extractSwitchName(l)));

  } catch(e) { /* server unavailable */ }
}

// ── Init ────────────────────────────────────────────────────────
loadConfig();
loadFiles();
toggleAuto();
pollLive();
setInterval(pollLive, INTERVAL);
// Grace period: don't expire init messages for 5 minutes after page load
setTimeout(() => { checkLiveExpiry(); setInterval(checkLiveExpiry, 30000); }, 5 * 60 * 1000);
</script>
</body>
</html>
